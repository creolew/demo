# Ingress: route traffic theo URL path (giống Nginx reverse proxy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # localhost/api/products → demo-app:8080/api/products
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: demo-app
                port:
                  number: 8080
