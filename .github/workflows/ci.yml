# GitHub Actions: Tự động chạy mỗi khi push code
name: CI Pipeline

# Khi nào chạy?
on:
  push:
    branches: [ main ] # Push lên main → chạy
  pull_request:
    branches: [ main ] # Tạo PR vào main → chạy

# Làm gì?
jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu của GitHub

    steps:
      # Bước 1: Checkout code (giống git clone)
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven # Cache dependencies cho lần sau nhanh hơn

      # Bước 3: Build
      - name: Build
        run: mvn clean package -DskipTests

      # Bước 4: Upload artifact (file .jar)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demo-app
          path: target/*.jar

      # Bước 5: Login Docker Hub (dùng Secrets, không lộ password)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 6: Build + Push Docker image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demo-app:latest
            ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}
