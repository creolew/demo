# GitHub Actions: Tự động chạy mỗi khi push code
name: CI Pipeline

# Khi nào chạy?
on:
  push:
    branches: [ main ]      # Push lên main → chạy
  pull_request:
    branches: [ main ]      # Tạo PR vào main → chạy

# Làm gì?
jobs:
  build:
    runs-on: ubuntu-latest   # Chạy trên máy ảo Ubuntu của GitHub

    steps:
      # Bước 1: Checkout code (giống git clone)
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven        # Cache dependencies cho lần sau nhanh hơn

      # Bước 3: Build + Test
      - name: Build and Test
        run: mvn clean package

      # Bước 4: Upload artifact (file .jar)
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: demo-app
          path: target/*.jar
